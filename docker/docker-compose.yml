version: '3.8'

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:172.17.0.1" # Map to host IP (Linux hosts only!)
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:z # :z flag is required on Linux distros with SELinux enabled. Other systems shouldn't be affected
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  app:
    image: node:18
    container_name: proyecto_app
    working_dir: /usr/src/app
    env_file:
      - ../.env
    volumes:
      - ../:/usr/src/app:ro
    command: sh -c "npm install --silent && node server.js"
    ports:
      - "4000:4000"
    restart: unless-stopped

volumes:
  grafana_data:
  