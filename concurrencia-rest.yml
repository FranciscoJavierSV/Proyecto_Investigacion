config:
  target: "http://localhost:4000"
  phases:
    - duration: 15
      arrivalRate: 500
      name: "Prueba de carga REST con 500 req/sec"

scenarios:
  - name: "Consultar REST"
    flow:
      - get:
          url: "/rest/?size=50&offset=0"
          expect:
            - statusCode: 200
# artillery run concurrencia-rest.yml