config:
  target: "http://localhost:4000"
  phases:
    - duration: 30
      arrivalRate: 100
      name: "Prueba de carga REST con 100 req/sec"

scenarios:
  - name: "Consultar REST"
    flow:
      - get:
          url: "/rest/?size=50&offset=0"
          expect:
            - statusCode: 200
